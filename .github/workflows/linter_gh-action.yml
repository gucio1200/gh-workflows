---
name: "Action Lint"

on:
  workflow_call:
    inputs:
      actionlint_config:
        description: "Path to actionlint config"
        type: string
        default: ""
      runs-on:
        description: "Default runner"
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
      with:
        files: |
          .github/workflows/**.yaml
          .github/workflows/**.yml

    - name: Run actionlint
      if: steps.changed-files.outputs.any_changed == 'true'
      uses: bjw-s/action-actionlint@b346813e82708106544f48a93a5b3fbeeb8e37eb # v0.1.1
      with:
        actionlint_config: ${{ inputs.actionlint_config || '' }}
        file_pattern: ${{ steps.changed-files.outputs.all_changed_files }}
